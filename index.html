<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>壹金金业 - 实时报价系统</title>
    <style>
        /* 基础重置与全局样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f4f5f7; color: #333; }
        
        /* 顶部导航栏 (采用暗金色调彰显黄金行业质感) */
        .header { 
            background: linear-gradient(135deg, #c5a059, #8c6a32); 
            color: #fff; 
            text-align: center; 
            padding: 16px 0; 
            font-size: 20px; 
            font-weight: bold; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.15); 
        }

        /* 时间与状态提示条 */
        .status-bar { 
            background-color: #fff; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px; 
            border-bottom: 1px solid #ebebeb; 
        }
        .status-bar .market-status { color: #e53935; font-weight: bold; } /* 默认显示交易中 */
        .status-bar .time { color: #666; }

        /* 报价表格主体 */
        .quote-container { background-color: #fff; margin-top: 10px; }
        .quote-table { width: 100%; border-collapse: collapse; }
        .quote-table th, .quote-table td { 
            padding: 14px 10px; 
            text-align: center; 
            border-bottom: 1px solid #f0f0f0; 
        }
        .quote-table th { background-color: #fafafa; color: #888; font-size: 13px; font-weight: 500; }
        .quote-table td { font-size: 16px; font-weight: 600; font-family: monospace; }
        
        /* 品种名称样式 */
        .product-name { color: #222; font-size: 15px; }
        .product-desc { display: block; font-size: 11px; color: #999; font-weight: normal; margin-top: 2px;}
        
        /* 涨跌颜色 (国内习惯：红涨绿跌) */
        .price-up { color: #e53935; }
        .price-down { color: #43a047; }
        .price-flat { color: #333; }

        /* 价格变动时的闪烁动画特效 */
        @keyframes flashRed { 0% { background-color: rgba(229, 57, 53, 0.2); } 100% { background-color: transparent; } }
        @keyframes flashGreen { 0% { background-color: rgba(67, 160, 71, 0.2); } 100% { background-color: transparent; } }
        .bg-flash-up { animation: flashRed 0.8s ease-out; }
        .bg-flash-down { animation: flashGreen 0.8s ease-out; }

        /* 底部公司信息 */
        .footer { 
            text-align: center; 
            padding: 25px 15px; 
            margin-top: 15px; 
            background-color: #fff; 
            font-size: 12px; 
            color: #888; 
            line-height: 1.8; 
            border-top: 1px solid #ebebeb; 
        }
        .company-name { font-size: 15px; font-weight: bold; color: #c5a059; margin-bottom: 8px; }
        .address { display: flex; align-items: center; justify-content: center; gap: 5px; }
    </style>
</head>
<body>

    <header class="header">
        壹金金业
    </header>

    <div class="status-bar">
        <span class="market-status">● 盘中交易</span>
        <span class="time" id="currentTime">更新中...</span>
    </div>

    <div class="quote-container">
        <table class="quote-table">
            <thead>
                <tr>
                    <th>交易品种</th>
                    <th>国际大盘价</th>
                    <th>实时回收价</th>
                    <th>涨跌</th>
                </tr>
            </thead>
            <tbody id="priceTableBody">
                </tbody>
        </table>
    </div>

    <footer class="footer">
        <div class="company-name">壹金金业</div>
        <div>专业黄金回收 · 诚信经营 · 价格同步国际大盘</div>
        <div class="address">
            📍 贵州省贵阳市观山湖区长岭南路 33 号天一国际广场 12 栋 14 楼
        </div>
    </footer>

    <script>
        // 1. 初始化品种与基础价格数据 (这里模拟初始数据)
        // 实际开发中，这些数据应通过 AJAX 请求您的后端接口获取
        const products = [
            { id: 'au9999', name: '黄金 9999', desc: 'Au99.99', basePrice: 508.50, recycleDiff: -1.00 }, // 假设回收价低于大盘1元
            { id: 'pt9999', name: '铂金 9999', desc: 'Pt99.99', basePrice: 215.30, recycleDiff: -2.00 },
            { id: 'ag9999', name: '白银 9999', desc: 'Ag99.99', basePrice: 6.15, recycleDiff: -0.10 },
            { id: 'pd9999', name: '钯金 9999', desc: 'Pd99.99', basePrice: 240.80, recycleDiff: -3.00 }
        ];

        // 记录上一次的价格，用于判断涨跌颜色和触发动画
        const lastPrices = {};

        // 2. 格式化当前时间
        function updateTime() {
            const now = new Date();
            const timeString = now.getFullYear() + '-' + 
                String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                String(now.getDate()).padStart(2, '0') + ' ' + 
                String(now.getHours()).padStart(2, '0') + ':' + 
                String(now.getMinutes()).padStart(2, '0') + ':' + 
                String(now.getSeconds()).padStart(2, '0');
            document.getElementById('currentTime').innerText = timeString;
        }

        // 3. 渲染或更新表格数据
        function renderTable(data) {
            const tbody = document.getElementById('priceTableBody');
            
            data.forEach(item => {
                // 模拟价格波动 (此处加入随机数模拟大盘实时跳动，实际应使用真实接口数据)
                const volatility = (Math.random() - 0.5) * 0.5; // -0.25 到 0.25 之间的波动
                let currentMarketPrice = item.basePrice + volatility;
                let currentRecyclePrice = currentMarketPrice + item.recycleDiff;
                
                currentMarketPrice = currentMarketPrice.toFixed(2);
                currentRecyclePrice = currentRecyclePrice.toFixed(2);

                const prevPrice = lastPrices[item.id] || currentMarketPrice;
                const diff = (currentMarketPrice - prevPrice).toFixed(2);
                
                // 判断涨跌颜色和符号
                let colorClass = 'price-flat';
                let diffText = '0.00';
                let flashClass = '';

                if (diff > 0) {
                    colorClass = 'price-up';
                    diffText = '+' + diff;
                    flashClass = 'bg-flash-up';
                } else if (diff < 0) {
                    colorClass = 'price-down';
                    diffText = diff;
                    flashClass = 'bg-flash-down';
                }

                // 检查该行是否已存在
                let row = document.getElementById('row-' + item.id);
                
                if (!row) {
                    // 如果不存在则创建新行
                    row = document.createElement('tr');
                    row.id = 'row-' + item.id;
                    tbody.appendChild(row);
                } else {
                    // 移除旧的动画类，强制重绘以重新触发动画
                    row.classList.remove('bg-flash-up', 'bg-flash-down');
                    void row.offsetWidth; // 触发回流(reflow)
                }

                if(flashClass) row.classList.add(flashClass);

                // 更新行内HTML内容
                row.innerHTML = `
                    <td>
                        <div class="product-name">${item.name}</div>
                        <div class="product-desc">${item.desc}</div>
                    </td>
                    <td class="${colorClass}">${currentMarketPrice}</td>
                    <td class="${colorClass}" style="font-size: 18px;">${currentRecyclePrice}</td>
                    <td class="${colorClass}">${diffText}</td>
                `;

                // 更新记录
                lastPrices[item.id] = currentMarketPrice;
            });
        }

        // 4. 初始化启动定时任务
        function initSystem() {
            updateTime();
            renderTable(products);
            
            // 每秒更新一次时间
            setInterval(updateTime, 1000);
            
            // 每 3 秒模拟向服务器请求一次最新价格（在此模拟动态刷新）
            setInterval(() => {
                renderTable(products);
            }, 3000);
        }

        // 页面加载完成后执行
        window.onload = initSystem;
    </script>
</body>
</html>
